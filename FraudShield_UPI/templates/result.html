<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FraudShield Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
    body {
        min-height: 100vh;
        background:
            linear-gradient(
                rgba(0, 0, 0, 0.8),
                rgba(0, 0, 0, 0.8)
            ),
            url("/static/images/india_money_bg.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    .result-card {
        margin-top: 130px;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
    }

    .success {
        color: #00c853;
    }

    .danger {
        color: #d90429;
    }
</style>

</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg result-card text-center p-4">

                {% if "Fraud" in prediction %}
                    <h1 class="danger"><i class="fa-solid fa-triangle-exclamation"></i></h1>
                    <h2 class="danger">Fraud Transaction Detected</h2>
                    <p class="text-muted">Immediate action is recommended.</p>
                {% else %}
                    <h1 class="success"><i class="fa-solid fa-circle-check"></i></h1>
                    <h2 class="success">Transaction is Safe</h2>
                    <p class="text-muted">No suspicious activity detected.</p>
                {% endif %}

                <a href="/" class="btn btn-outline-light mt-4">
                    <i class="fa-solid fa-arrow-left"></i> Check Another Transaction
                </a>

            </div>
        </div>
    </div>
</div>

</body>
</html>
