<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FraudShield UPI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

   <style>
    body {
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        background: 
            linear-gradient(
                rgba(0, 0, 0, 0.75),
                rgba(0, 0, 0, 0.75)
            ),
            url("/static/images/india_money_bg.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    .navbar {
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(5px);
    }

    .brand {
        font-weight: 600;
        color: #ffb703 !important;
    }

    .card {
        border-radius: 20px;
        margin-top: 70px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
    }

    .card-header {
        background: linear-gradient(45deg, #ffb703, #fb8500);
        border-radius: 20px 20px 0 0;
        font-weight: 600;
        color: #000;
    }

    .btn-detect {
        background: linear-gradient(45deg, #ffb703, #fb8500);
        border: none;
        color: black;
        font-weight: 600;
        padding: 12px;
        border-radius: 30px;
    }

    .btn-detect:hover {
        transform: scale(1.02);
        transition: 0.3s ease;
    }

    label {
        font-weight: 500;
    }
</style>

</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand brand" href="#">
            <i class="fa-solid fa-shield-halved"></i> FraudShield UPI
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-lg">
                <div class="card-header text-center">
                    Secure UPI Transaction Verification
                </div>

                <div class="card-body p-4">

                    <form action="/predict" method="post">

                        <div class="mb-3">
                            <label><i class="fa-solid fa-indian-rupee-sign"></i> Transaction Amount</label>
                            <input type="number" class="form-control" name="transaction_amount" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label><i class="fa-solid fa-clock"></i> Transaction Time</label>
                                <input type="number" class="form-control" name="transaction_time" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label><i class="fa-solid fa-repeat"></i> Frequency</label>
                                <input type="number" class="form-control" name="transaction_frequency" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label><i class="fa-solid fa-location-dot"></i> Location Change</label>
                                <select class="form-select" name="location_change">
                                    <option value="0">No</option>
                                    <option value="1">Yes</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label><i class="fa-solid fa-mobile-screen"></i> Device Change</label>
                                <select class="form-select" name="device_change">
                                    <option value="0">No</option>
                                    <option value="1">Yes</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label><i class="fa-solid fa-store"></i> Merchant Risk</label>
                            <input type="number" step="0.01" class="form-control" name="merchant_risk" required>
                        </div>

                        <div class="mb-4">
                            <label><i class="fa-solid fa-exchange-alt"></i> Transaction Type</label>
                            <select class="form-select" name="transaction_type">
                                <option value="0">P2P</option>
                                <option value="1">P2M</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-detect">
                                <i class="fa-solid fa-magnifying-glass"></i> Detect Fraud
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
