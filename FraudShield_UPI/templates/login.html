<!DOCTYPE html>
<html>
<head>
    <title>FraudShield UPI | Login</title>
    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: #020617;
            padding: 35px;
            border-radius: 12px;
            width: 320px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
        }
        button {
            background: #ffb703;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .link {
            margin-top: 15px;
            text-align: center;
        }
        .link a {
            color: #ffb703;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>FraudShield UPI</h2>
    <p style="color:#94a3b8">Secure Login</p>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don’t have an account?
        <a href="/register">Register</a>
    </div>
</div>

</body>
</html>
